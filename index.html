<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CS 문의 관리 - Sheets FIXED</title><style>
body{margin:0;background:#f5f7fb;color:#1f2328;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.wrap{max-width:1200px;margin:0 auto;padding:26px 18px 50px}h1{margin:0 0 8px;font-size:28px}h2{font-size:18px;margin:0 0 12px}.sub{color:#667085;font-size:13px}.card{background:white;border:1px solid #e4e7ec;border-radius:18px;box-shadow:0 10px 28px rgba(31,35,40,.08);padding:18px;margin:0 0 16px}.grid{display:grid;gap:16px}@media(min-width:900px){.grid{grid-template-columns:1fr 1fr}}input,textarea,select{width:100%;box-sizing:border-box;border:1px solid #e4e7ec;border-radius:12px;padding:11px 12px;font:inherit}textarea{min-height:180px}label{display:block;font-weight:800;margin:10px 0 7px;font-size:13px}.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}button{border:0;border-radius:12px;background:#2563eb;color:white;padding:10px 13px;font-weight:900;cursor:pointer}button.secondary{background:#eef2ff;color:#1e3a8a}button.danger{background:#fee2e2;color:#991b1b}.status{display:inline-block;padding:10px 12px;border-radius:14px;font-weight:900;font-size:13px;border:1px solid #e4e7ec}.good{background:#ecfdf3;color:#166534}.bad{background:#fef2f2;color:#991b1b}.warn{background:#fffbeb;color:#92400e}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.tab{background:white;color:#344054;border:1px solid #e4e7ec;border-radius:999px}.tab.active{background:#2563eb;color:white}.section{display:none}.section.active{display:block}.tablewrap{overflow:auto;border:1px solid #e4e7ec;border-radius:14px;background:white}table{width:100%;border-collapse:collapse;min-width:980px}th,td{border-bottom:1px solid #e4e7ec;padding:10px 11px;text-align:left;vertical-align:top;font-size:13px}th{background:#f8fafc}.pill{display:inline-block;border-radius:999px;padding:4px 8px;background:#eef2ff;color:#1e3a8a;font-weight:900;font-size:12px}.높음{background:#fee2e2;color:#991b1b}.중간{background:#ffedd5;color:#9a3412}.낮음{background:#dcfce7;color:#166534}.reply{white-space:pre-wrap;max-width:360px}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#111827;color:#fff;border-radius:999px;padding:10px 14px;font-weight:800;opacity:0;transition:.2s}.toast.show{opacity:1}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.kpi{border:1px solid #e4e7ec;border-radius:16px;padding:13px;background:#fbfcff}.num{font-size:25px;font-weight:950}.filters{display:grid;grid-template-columns:1fr 160px 160px;gap:8px;margin:12px 0}
</style></head><body><div class="wrap"><h1>CS 문의 관리 - Google Sheets 연동</h1><p class="sub">저장 확인 FIXED 버전. 저장 성공 시 “N건 저장됨”이 뜹니다.</p><p style="margin-top:12px"><span id="conn" class="status warn">연동 설정 필요</span></p>
<div class="tabs"><button class="tab active" onclick="tab('setup')">연동 설정</button><button class="tab" onclick="tab('input')">문의 입력</button><button class="tab" onclick="tab('list')">공유 문의</button></div>
<section id="setup" class="section active"><div class="card"><h2>연동 설정</h2><label>Apps Script 웹 앱 URL</label><input id="apiUrl" placeholder="https://script.google.com/macros/s/.../exec"><label>공유 비밀번호</label><input id="apiKey" type="password"><div class="btns"><button onclick="saveConfig()">설정 저장</button><button class="secondary" onclick="testConn()">연결 테스트</button><button class="secondary" onclick="loadRows()">문의 새로고침</button></div><p class="sub" style="margin-top:10px">연결 테스트가 성공하면 CS문의 시트가 자동 생성됩니다.</p></div><div class="card"><h2>현황</h2><div class="kpis"><div class="kpi"><div id="t" class="num">0</div><div class="sub">전체</div></div><div class="kpi"><div id="a" class="num">0</div><div class="sub">미처리</div></div><div class="kpi"><div id="b" class="num">0</div><div class="sub">처리중</div></div><div class="kpi"><div id="c" class="num">0</div><div class="sub">완료</div></div></div></div></section>
<section id="input" class="section"><div class="grid"><div class="card"><h2>문의 입력</h2><textarea id="bulk" placeholder="배송 언제 출고되나요? 주문번호 1234입니다.&#10;상품 불량이라 교환 가능할까요?"></textarea><div class="btns"><button onclick="previewNow()">미리 분류</button><button class="secondary" onclick="saveRows()">Google Sheets에 저장</button><button class="secondary" onclick="sample()">예시</button></div></div><div class="card"><h2>미리보기</h2><div class="tablewrap"><table style="min-width:700px"><thead><tr><th>No</th><th>문의</th><th>유형</th><th>우선순위</th><th>답변</th></tr></thead><tbody id="preview"><tr><td colspan="5">미리보기 없음</td></tr></tbody></table></div></div></div></section>
<section id="list" class="section"><div class="card"><h2>공유 문의</h2><div class="btns"><button class="secondary" onclick="loadRows()">새로고침</button><button class="secondary" onclick="copyReplies()">답변 복사</button><button class="secondary" onclick="csv()">CSV</button></div><div class="filters"><input id="q" placeholder="검색" oninput="renderRows()"><select id="fs" onchange="renderRows()"><option value="">상태 전체</option><option>미처리</option><option>처리중</option><option>완료</option></select><select id="fp" onchange="renderRows()"><option value="">우선순위 전체</option><option>높음</option><option>중간</option><option>낮음</option></select></div><div class="tablewrap"><table><thead><tr><th>No</th><th>등록일</th><th>문의</th><th>유형</th><th>우선</th><th>상태</th><th>답변</th><th>메모</th><th>삭제</th></tr></thead><tbody id="rows"><tr><td colspan="9">불러온 문의 없음</td></tr></tbody></table></div></div></section></div><div id="toast" class="toast">완료</div>
<script>
const S={url:'csFix.url',key:'csFix.key'};let rows=[],pre=[];const rules=[['배송/출고',['배송','출고','송장','택배','도착','지연','발송','언제','안왔'],'주문번호 확인 후 출고/배송 상태 안내','안녕하세요. 배송 건 확인 도와드리겠습니다.\n주문번호 또는 수령자 정보를 남겨주시면 출고 여부와 배송 진행 상태를 확인 후 안내드리겠습니다.'],['주문/결제',['주문','결제','입금','카드','주문번호','확인'],'결제 내역 및 주문 상태 확인','안녕하세요. 주문 및 결제 내역 확인 도와드리겠습니다.\n주문번호 또는 결제자 정보를 남겨주시면 정상 접수 여부를 확인 후 안내드리겠습니다.'],['샘플',['샘플','키트','견본','sample'],'샘플 종류와 수령 정보 확인','안녕하세요. 샘플 신청 관련 안내드립니다.\n원하시는 샘플 종류와 수령 정보를 남겨주시면 접수 가능 여부와 발송 일정을 확인 후 안내드리겠습니다.'],['환불/교환',['환불','교환','반품','불량','파손','하자','오배송','취소'],'주문 상태와 사유 확인 후 정책 기준 안내','안녕하세요. 먼저 이용에 불편을 드려 죄송합니다.\n주문번호와 상품 상태 사진을 남겨주시면 환불/교환 가능 여부를 확인 후 안내드리겠습니다.'],['상품/제작',['상품','제작','사양','옵션','가능','디자인','수량','견적','단가'],'상품 사양, 수량, 제작 가능 여부 확인','안녕하세요. 상품 및 제작 가능 여부 확인 도와드리겠습니다.\n상품 종류, 수량, 제작 사양을 남겨주시면 확인 후 안내드리겠습니다.'],['파트너사/출고관리',['파트너','파트너사','거래처','출고 요청','재고','입고','정산'],'파트너사명과 출고/재고 정보 확인','안녕하세요. 파트너사 운영 건 확인 도와드리겠습니다.\n파트너사명과 요청 내용을 남겨주시면 확인 후 안내드리겠습니다.']];
const urgent=['불량','파손','환불','교환','오배송','취소','클레임','지연','안왔','불만'];
function $(id){return document.getElementById(id)}function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}function toast(m){$('toast').textContent=m;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1500)}function setC(cls,msg){$('conn').className='status '+cls;$('conn').textContent=msg}
function tab(id){document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));event.target.classList.add('active')}
function cfg(){return{url:$('apiUrl').value.trim(),key:$('apiKey').value.trim()}}function saveConfig(){localStorage.setItem(S.url,cfg().url);localStorage.setItem(S.key,cfg().key);toast('설정 저장')}
function jsonp(params){const c=cfg();if(!c.url||!c.key)return Promise.reject(new Error('URL/비밀번호 입력 필요'));return new Promise((res,rej)=>{const cb='cb_'+Date.now()+Math.random().toString(36).slice(2);const u=new URL(c.url);Object.entries({...params,key:c.key,callback:cb}).forEach(([k,v])=>u.searchParams.set(k,typeof v==='string'?v:JSON.stringify(v)));const sc=document.createElement('script');const timer=setTimeout(()=>{clean();rej(new Error('응답 시간 초과. 배포/권한 확인'))},16000);function clean(){clearTimeout(timer);delete window[cb];sc.remove()}window[cb]=d=>{clean();res(d)};sc.onerror=()=>{clean();rej(new Error('연결 실패'))};sc.src=u;document.body.appendChild(sc)})}
async function testConn(){saveConfig();setC('warn','연결 테스트 중');try{const r=await jsonp({action:'test'});if(!r.ok)throw new Error(r.error);setC('good','연결됨 / 시트 '+r.lastRow+'행');toast('연결 성공')}catch(e){setC('bad','연결 실패');alert(e.message)}}
function classify(t){const l=t.toLowerCase();let best=null,score=0;for(const r of rules){let s=0;for(const k of r[1])if(l.includes(k.toLowerCase()))s++;if(s>score){score=s;best=r}}let pri='낮음';const us=urgent.filter(k=>l.includes(k)).length;if(us>=2||['불량','파손','오배송'].some(k=>l.includes(k)))pri='높음';else if(us===1||l.includes('지연')||l.includes('취소'))pri='중간';if(!best)best=['기타',[],'상담원이 내용 확인','안녕하세요. 문의 내용 확인 후 안내드리겠습니다.\n확인을 위해 주문번호 또는 관련 정보를 남겨주시면 빠르게 확인 도와드리겠습니다.'];return{original:t,category:best[0],priority:pri,autoPossible:pri!=='높음',action:best[2],reply:best[3],status:'미처리',memo:''}}
function previewNow(){pre=$('bulk').value.trim().split(/\n+/).map(x=>x.trim()).filter(Boolean).map(classify);$('preview').innerHTML=pre.length?pre.map((r,i)=>`<tr><td>${i+1}</td><td>${esc(r.original)}</td><td><span class="pill">${esc(r.category)}</span></td><td><span class="pill ${r.priority}">${r.priority}</span></td><td class="reply">${esc(r.reply)}</td></tr>`).join(''):'<tr><td colspan="5">미리보기 없음</td></tr>';toast('미리 분류 '+pre.length+'건')}
async function saveRows(){if(!pre.length)previewNow();if(!pre.length)return toast('저장할 문의 없음');try{setC('warn','저장 중');const r=await jsonp({action:'addMany',items:pre,source:'github-pages'});if(!r.ok)throw new Error(r.error);toast(r.added+'건 저장됨');setC('good','저장 완료 / 시트 '+r.lastRow+'행');$('bulk').value='';pre=[];previewNow();await loadRows()}catch(e){setC('bad','저장 실패');alert('저장 실패: '+e.message)}}
async function loadRows(){saveConfig();setC('warn','불러오는 중');try{const r=await jsonp({action:'list'});if(!r.ok)throw new Error(r.error);rows=r.rows||[];setC('good','공유 문의 '+rows.length+'건 / 시트 '+r.lastRow+'행');renderRows();toast('불러오기 완료')}catch(e){setC('bad','불러오기 실패');alert(e.message)}}
function shown(){const q=$('q')?.value.toLowerCase()||'',s=$('fs')?.value||'',p=$('fp')?.value||'';return rows.filter(r=>(!q||[r.original,r.category,r.reply,r.memo].some(v=>String(v||'').toLowerCase().includes(q)))&&(!s||r.status===s)&&(!p||r.priority===p))}
function renderRows(){const a=shown();$('t').textContent=rows.length;$('a').textContent=rows.filter(x=>x.status==='미처리').length;$('b').textContent=rows.filter(x=>x.status==='처리중').length;$('c').textContent=rows.filter(x=>x.status==='완료').length;$('rows').innerHTML=a.length?a.map((r,i)=>`<tr><td>${i+1}</td><td>${esc(r.createdAt)}</td><td>${esc(r.original)}</td><td><span class="pill">${esc(r.category)}</span></td><td><span class="pill ${r.priority}">${esc(r.priority)}</span></td><td><select onchange="upd('${r.id}','status',this.value)">${['미처리','처리중','완료'].map(s=>`<option ${r.status===s?'selected':''}>${s}</option>`).join('')}</select></td><td class="reply">${esc(r.reply)}<div class="btns"><button class="secondary" onclick='navigator.clipboard.writeText(${JSON.stringify(r.reply)});toast("복사")'>복사</button></div></td><td><textarea style="min-height:70px" onchange="upd('${r.id}','memo',this.value)">${esc(r.memo)}</textarea></td><td><button class="danger" onclick="delRow('${r.id}')">삭제</button></td></tr>`).join(''):'<tr><td colspan="9">표시할 문의 없음</td></tr>'}
async function upd(id,f,v){try{const p={action:'update',id};if(f==='status')p.status=v;else p.memo=v;const r=await jsonp(p);if(!r.ok)throw new Error(r.error);toast('저장됨');await loadRows()}catch(e){alert('수정 실패: '+e.message)}}
async function delRow(id){if(!confirm('삭제 표시할까요?'))return;try{const r=await jsonp({action:'delete',id});if(!r.ok)throw new Error(r.error);toast('삭제됨');await loadRows()}catch(e){alert('삭제 실패: '+e.message)}}
function copyReplies(){const txt=shown().map((r,i)=>`[${i+1}] ${r.category} / ${r.priority}\n문의: ${r.original}\n답변:\n${r.reply}`).join('\n\n');navigator.clipboard.writeText(txt);toast('복사')}
function csv(){const a=shown();const h=['등록일','문의','유형','우선순위','상태','답변','메모'];const c=[h,...a.map(r=>[r.createdAt,r.original,r.category,r.priority,r.status,r.reply,r.memo])].map(row=>row.map(x=>`"${String(x??'').replaceAll('"','""')}"`).join(',')).join('\n');const blob=new Blob(['\ufeff'+c],{type:'text/csv'});const u=URL.createObjectURL(blob);const aTag=document.createElement('a');aTag.href=u;aTag.download='cs_rows.csv';aTag.click();URL.revokeObjectURL(u)}
function sample(){$('bulk').value='배송 언제 출고되나요? 주문번호 1234입니다.\n상품 불량이라 교환 가능할까요?\n샘플 키트 신청하고 싶습니다.';previewNow()}
window.onload=()=>{$('apiUrl').value=localStorage.getItem(S.url)||localStorage.getItem('csSheets.apiUrl.v2')||localStorage.getItem('csSheets.apiUrl.v1')||'';$('apiKey').value=localStorage.getItem(S.key)||localStorage.getItem('csSheets.apiKey.v2')||localStorage.getItem('csSheets.apiKey.v1')||'';if(cfg().url&&cfg().key)loadRows()}
</script></body></html>
