<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CS 문의 관리 - FIXED v2</title>
<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f7fb;margin:0;color:#1f2328}.wrap{max-width:1120px;margin:0 auto;padding:28px 18px}h1{margin:0 0 6px;font-size:28px}.sub{color:#667085;margin:0 0 18px}.card{background:#fff;border:1px solid #e4e7ec;border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:0 8px 24px rgba(0,0,0,.06)}label{display:block;font-weight:800;margin:10px 0 6px}input,textarea,select{width:100%;box-sizing:border-box;border:1px solid #d0d5dd;border-radius:10px;padding:10px;font:inherit}textarea{min-height:150px}button{border:0;background:#2563eb;color:white;border-radius:10px;padding:10px 14px;font-weight:800;cursor:pointer;margin:8px 6px 0 0}button.secondary{background:#eef2ff;color:#1e3a8a}button.danger{background:#fee2e2;color:#991b1b}.status{display:inline-block;border-radius:999px;padding:8px 12px;font-weight:900;margin-top:8px}.ok{background:#dcfce7;color:#166534}.bad{background:#fee2e2;color:#991b1b}.warn{background:#fffbeb;color:#92400e}.grid{display:grid;gap:14px}@media(min-width:880px){.grid{grid-template-columns:1fr 1fr}}table{width:100%;border-collapse:collapse;background:white}th,td{border-bottom:1px solid #e4e7ec;padding:10px;text-align:left;vertical-align:top;font-size:13px}th{background:#f8fafc}.tablewrap{overflow:auto;border:1px solid #e4e7ec;border-radius:12px}.pill{display:inline-block;border-radius:999px;background:#eef2ff;color:#1e3a8a;padding:4px 8px;font-weight:800;font-size:12px}.reply{white-space:pre-wrap;max-width:360px}.small{font-size:12px;color:#667085}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#111827;color:#fff;border-radius:999px;padding:10px 14px;font-weight:800;opacity:0;transition:.2s}.toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <h1>CS 문의 관리 - FIXED v2</h1>
  <p class="sub">이 화면이 보이면 FIXED v2 index.html이 정상 반영된 것입니다. 저장은 Google Apps Script JSONP 방식으로 처리합니다.</p>

  <div class="card">
    <h2>1. 연동 설정</h2>
    <label>Apps Script 웹 앱 URL</label>
    <input id="apiUrl" placeholder="https://script.google.com/macros/s/....../exec" />
    <label>공유 비밀번호</label>
    <input id="apiKey" type="password" placeholder="Code.gs의 SERVER_SECRET 값" />
    <button onclick="saveConfig()">설정 저장</button>
    <button class="secondary" onclick="testConnection()">연결 테스트</button>
    <button class="secondary" onclick="loadRows()">시트 불러오기</button>
    <div id="status" class="status warn">연동 전</div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>2. 문의 입력</h2>
      <textarea id="inputText" placeholder="문의를 한 줄에 하나씩 입력하세요.\n배송 언제 출고되나요?\n상품 불량이라 교환 가능할까요?"></textarea>
      <button onclick="previewRows()">미리 분류</button>
      <button class="secondary" onclick="saveRows()">Google Sheets에 저장</button>
      <button class="secondary" onclick="sample()">예시 넣기</button>
      <button class="danger" onclick="clearInput()">초기화</button>
    </div>
    <div class="card">
      <h2>3. 미리보기</h2>
      <div class="tablewrap"><table><thead><tr><th>No</th><th>문의</th><th>유형</th><th>우선순위</th><th>답변</th></tr></thead><tbody id="preview"><tr><td colspan="5">미리보기 없음</td></tr></tbody></table></div>
    </div>
  </div>

  <div class="card">
    <h2>4. 공유 문의 목록</h2>
    <p class="small">Google Sheets에 저장된 문의입니다. 저장 후 자동으로 새로고침됩니다.</p>
    <div class="tablewrap"><table><thead><tr><th>No</th><th>등록일</th><th>문의</th><th>유형</th><th>우선순위</th><th>상태</th><th>답변</th><th>메모</th><th>삭제</th></tr></thead><tbody id="rows"><tr><td colspan="9">불러온 데이터 없음</td></tr></tbody></table></div>
  </div>
</div>
<div id="toast" class="toast">완료</div>
<script>
const LS_URL='csFixedV2.url', LS_KEY='csFixedV2.key';
const rules=[
 {category:'배송/출고',keywords:['배송','출고','송장','택배','도착','지연','발송','언제','안왔','안 왔'],auto:true,action:'주문번호 확인 후 배송 상태 확인',reply:'안녕하세요. 배송 건 확인 도와드리겠습니다.\n주문번호 또는 수령자 정보를 남겨주시면 출고 여부와 배송 진행 상태를 확인 후 안내드리겠습니다.'},
 {category:'주문/결제',keywords:['주문','결제','입금','카드','주문번호','확인'],auto:true,action:'주문/결제 내역 확인',reply:'안녕하세요. 주문 및 결제 내역 확인 도와드리겠습니다.\n주문번호 또는 결제자 정보를 남겨주시면 정상 접수 여부를 확인 후 안내드리겠습니다.'},
 {category:'샘플',keywords:['샘플','키트','견본','sample'],auto:true,action:'샘플 종류와 수령 정보 확인',reply:'안녕하세요. 샘플 신청 관련 안내드립니다.\n원하시는 샘플 종류와 수령 정보를 남겨주시면 접수 가능 여부와 발송 일정을 확인 후 안내드리겠습니다.'},
 {category:'환불/교환',keywords:['환불','교환','반품','불량','파손','하자','오배송','취소'],auto:false,action:'주문 상태와 사유 확인',reply:'안녕하세요. 먼저 이용에 불편을 드려 죄송합니다.\n환불/교환 가능 여부 확인을 위해 주문번호와 상품 상태 사진을 함께 남겨주시면 확인 후 안내드리겠습니다.'},
 {category:'상품/제작',keywords:['상품','제작','사양','옵션','가능','디자인','수량','견적','단가'],auto:true,action:'상품 사양 확인',reply:'안녕하세요. 상품 및 제작 가능 여부 확인 도와드리겠습니다.\n희망하시는 상품 종류, 수량, 제작 사양을 남겨주시면 확인 후 안내드리겠습니다.'},
 {category:'파트너사/출고관리',keywords:['파트너','파트너사','거래처','출고 요청','재고','입고','정산'],auto:false,action:'파트너사명과 출고/재고 정보 확인',reply:'안녕하세요. 파트너사 운영 건 확인 도와드리겠습니다.\n파트너사명과 요청 내용을 남겨주시면 출고, 재고, 일정 관련 내용을 확인 후 안내드리겠습니다.'}
];
const urgent=['불량','파손','환불','교환','오배송','취소','클레임','지연','안왔','안 왔','불만'];
let preview=[]; let shared=[];
function esc(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1400)}
function setStatus(cls,t){const el=document.getElementById('status');el.className='status '+cls;el.textContent=t}
function cfg(){return {url:document.getElementById('apiUrl').value.trim(), key:document.getElementById('apiKey').value.trim()}}
function saveConfig(){const c=cfg();localStorage.setItem(LS_URL,c.url);localStorage.setItem(LS_KEY,c.key);toast('설정 저장됨')}
function jsonp(params){const c=cfg(); if(!c.url||!c.key) return Promise.reject(new Error('URL과 비밀번호를 입력하세요.'));
 return new Promise((resolve,reject)=>{const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2); const url=new URL(c.url); Object.entries({...params,key:c.key,callback:cb}).forEach(([k,v])=>{if(v!==undefined&&v!==null) url.searchParams.set(k, typeof v==='string'?v:JSON.stringify(v));}); const s=document.createElement('script'); const timer=setTimeout(()=>{cleanup();reject(new Error('응답 시간 초과. Apps Script 배포/권한 확인 필요'))},16000); function cleanup(){clearTimeout(timer);delete window[cb];s.remove()} window[cb]=(data)=>{cleanup();resolve(data)}; s.onerror=()=>{cleanup();reject(new Error('연결 실패. 웹 앱 URL 확인 필요'))}; s.src=url.toString(); document.body.appendChild(s);});}
async function testConnection(){saveConfig();setStatus('warn','테스트 중');try{const r=await jsonp({action:'test'}); if(!r.ok) throw new Error(r.error||'실패'); setStatus('ok',`연결됨 / ${r.sheetName} / ${r.lastRow}행`); toast('연결 성공');}catch(e){setStatus('bad','연결 실패'); alert(e.message)}}
function classify(text){const low=text.toLowerCase();let best=null,score=0;for(const r of rules){let s=0;for(const k of r.keywords){if(low.includes(k.toLowerCase())) s++} if(s>score){score=s;best=r}} const u=urgent.filter(k=>low.includes(k.toLowerCase())).length;let priority='낮음'; if(u>=2||['불량','파손','오배송'].some(k=>low.includes(k))) priority='높음'; else if(u===1) priority='중간'; if(!best) best={category:'기타',auto:false,action:'상담원 확인',reply:'안녕하세요. 문의 내용 확인 후 안내드리겠습니다.\n정확한 확인을 위해 주문번호 또는 관련 정보를 함께 남겨주시면 빠르게 확인 도와드리겠습니다.'}; return {original:text,category:best.category,priority,autoPossible:best.auto&&priority!=='높음',action:best.action,reply:best.reply,status:'미처리',memo:''}}
function previewRows(){const raw=document.getElementById('inputText').value.trim();preview=raw?raw.split(/\n+/).map(x=>x.trim()).filter(Boolean).map(classify):[];renderPreview();toast(`${preview.length}건 분류됨`)}
function renderPreview(){const body=document.getElementById('preview'); if(!preview.length){body.innerHTML='<tr><td colspan="5">미리보기 없음</td></tr>';return} body.innerHTML=preview.map((r,i)=>`<tr><td>${i+1}</td><td>${esc(r.original)}</td><td><span class="pill">${esc(r.category)}</span></td><td>${esc(r.priority)}</td><td class="reply">${esc(r.reply)}</td></tr>`).join('')}
async function saveRows(){if(!preview.length) previewRows(); if(!preview.length){toast('저장할 문의 없음');return} setStatus('warn','저장 중'); try{const r=await jsonp({action:'addMany',items:preview,source:'github-pages'}); if(!r.ok) throw new Error(r.error||'저장 실패'); setStatus('ok',`${r.added}건 저장됨 / ${r.lastRow}행`); toast(`${r.added}건 저장됨`); clearInput(); await loadRows();}catch(e){setStatus('bad','저장 실패'); alert(e.message)}}
async function loadRows(){saveConfig();setStatus('warn','불러오는 중');try{const r=await jsonp({action:'list'}); if(!r.ok) throw new Error(r.error||'불러오기 실패'); shared=r.rows||[]; setStatus('ok',`공유 문의 ${shared.length}건 / ${r.lastRow}행`); renderRows(); toast('불러오기 완료');}catch(e){setStatus('bad','불러오기 실패'); alert(e.message)}}
function renderRows(){const body=document.getElementById('rows'); if(!shared.length){body.innerHTML='<tr><td colspan="9">데이터 없음</td></tr>';return} body.innerHTML=shared.map((r,i)=>`<tr><td>${i+1}</td><td>${esc(r.createdAt)}</td><td>${esc(r.original)}</td><td><span class="pill">${esc(r.category)}</span></td><td>${esc(r.priority)}</td><td><select onchange="updateRow('${esc(r.id)}','status',this.value)">${['미처리','처리중','완료'].map(s=>`<option ${r.status===s?'selected':''}>${s}</option>`).join('')}</select></td><td class="reply">${esc(r.reply)}</td><td><textarea style="min-height:70px" onchange="updateRow('${esc(r.id)}','memo',this.value)">${esc(r.memo)}</textarea></td><td><button class="danger" onclick="deleteRow('${esc(r.id)}')">삭제</button></td></tr>`).join('')}
async function updateRow(id,field,value){try{const p={action:'update',id}; if(field==='status')p.status=value; if(field==='memo')p.memo=value; const r=await jsonp(p); if(!r.ok) throw new Error(r.error||'수정 실패'); toast('수정됨'); await loadRows();}catch(e){alert(e.message)}}
async function deleteRow(id){if(!confirm('삭제 표시할까요?'))return;try{const r=await jsonp({action:'delete',id}); if(!r.ok) throw new Error(r.error||'삭제 실패'); toast('삭제됨'); await loadRows();}catch(e){alert(e.message)}}
function sample(){document.getElementById('inputText').value=['배송 언제 출고되나요? 주문번호 1234입니다.','상품 불량이라 교환 가능할까요?','샘플 키트 신청하고 싶습니다.','결제했는데 주문 확인이 안 됩니다.'].join('\n');previewRows()}
function clearInput(){document.getElementById('inputText').value='';preview=[];renderPreview()}
window.addEventListener('DOMContentLoaded',()=>{document.getElementById('apiUrl').value=localStorage.getItem(LS_URL)||'';document.getElementById('apiKey').value=localStorage.getItem(LS_KEY)||''; if(cfg().url&&cfg().key) loadRows();});
</script>
</body>
</html>
